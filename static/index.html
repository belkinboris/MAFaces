<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реестр — сделки и компании российского рынка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,300;7..72,400;7..72,500;7..72,600&family=IBM+Plex+Sans:wght@400;500;600&subset=cyrillic&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F5F1; --card:#FFFFFF; --ink:#15191D; --muted:#66707A;
  --line:#E2E5DF; --line-soft:#ECEEE8;
  --accent:#1D5A44; --accent-deep:#0F2B21; --accent-soft:#E9F0EC; --ivory:#F3F1E9;
  --radius:4px;
  --f-display:'Literata',Georgia,serif;
  --f-body:'IBM Plex Sans',system-ui,sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--f-body);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.num{font-variant-numeric:tabular-nums}
.label{font-family:var(--f-body);font-weight:600;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.reveal{opacity:0}
.reveal.in{animation:fadeUp .6s var(--ease) forwards}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1}.reveal.in{animation:none}}

/* ---------- shell ---------- */
.top{position:sticky;top:0;z-index:50;background:rgba(245,245,241,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-in{max-width:1120px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;gap:40px}
.wordmark{font-family:var(--f-display);font-weight:600;font-size:22px;letter-spacing:.01em}
.wordmark span{color:var(--accent)}
nav{display:flex;gap:30px;margin-left:auto}
nav a{position:relative;padding:6px 0;font-weight:500;font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);transition:color .25s}
nav a::after{content:"";position:absolute;left:0;bottom:0;height:1.5px;width:0;background:var(--accent);transition:width .3s var(--ease)}
nav a:hover{color:var(--ink)}
nav a.on{color:var(--ink)}
nav a.on::after,nav a:hover::after{width:100%}
.wrap{max-width:1120px;margin:0 auto;padding:0 28px 100px}

/* ---------- dark hero ---------- */
.hero{background:var(--accent-deep);color:var(--ivory);margin:0 -28px;padding:72px 28px 64px}
.hero-in{max-width:1064px;margin:0 auto}
.hero .kicker{font-weight:600;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8FAE9F;margin-bottom:22px}
.hero h1{font-family:var(--f-display);font-weight:400;font-size:clamp(30px,4.6vw,46px);line-height:1.18;max-width:760px;letter-spacing:.005em}
.hero h1 em{font-style:italic;color:#BFD6C9}
.hero p{color:#A9BDB2;margin-top:18px;max-width:600px;font-size:15.5px}
.aisearch{display:flex;gap:0;margin-top:34px;max-width:680px;border:1px solid rgba(243,241,233,.25);border-radius:var(--radius);overflow:hidden;background:rgba(243,241,233,.06);transition:border-color .3s}
.aisearch:focus-within{border-color:rgba(243,241,233,.55)}
.aisearch input{flex:1;padding:15px 20px;border:none;background:transparent;font:inherit;color:var(--ivory)}
.aisearch input::placeholder{color:#7E948A}
.aisearch input:focus{outline:none}
.aisearch button{background:var(--ivory);color:var(--accent-deep);padding:0 26px;font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;transition:background .2s}
.aisearch button:hover{background:#fff}
.hero-rule{height:1px;background:rgba(243,241,233,.18);margin:44px 0 0;max-width:680px}
.hero-note{margin-top:14px;font-size:12.5px;color:#7E948A}

/* ---------- section head ---------- */
.sec-head{margin:56px 0 26px}
.sec-head .label{display:block;margin-bottom:10px;color:var(--accent)}
.sec-head h1{font-family:var(--f-display);font-weight:400;font-size:30px;letter-spacing:.005em}
.sec-head p{color:var(--muted);margin-top:8px;max-width:660px}

/* ---------- filters ---------- */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 24px}
.chip{padding:7px 15px;border:1px solid var(--line);border-radius:99px;background:var(--card);font-size:13px;color:var(--muted);transition:all .2s var(--ease)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ---------- deal rows ---------- */
.deal-row{display:grid;grid-template-columns:96px 1fr 190px;gap:22px;padding:24px 22px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;transition:border-color .25s,box-shadow .25s;align-items:start}
.deal-row:hover{border-color:var(--accent);box-shadow:0 6px 24px -14px rgba(15,43,33,.28)}
.deal-title{font-family:var(--f-display);font-weight:500;font-size:19.5px;line-height:1.34;transition:color .2s}
.deal-row:hover .deal-title{color:var(--accent)}
.deal-sub{color:var(--muted);font-size:13.5px;margin-top:6px}
.deal-meta{text-align:right}
.deal-sum{font-family:var(--f-display);font-weight:600;font-size:17.5px}
.deal-sum.na{color:var(--muted);font-weight:400;font-size:13.5px;font-family:var(--f-body)}
.tag{display:inline-block;margin-top:8px;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:4px 10px;border-radius:2px}
.status{display:inline-block;font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--muted)}
.status.closed{border-color:var(--accent);color:var(--accent)}

/* ---------- detail ---------- */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin:34px 0 26px;transition:color .2s}
.back:hover{color:var(--accent)}
.d-head{padding-bottom:28px;border-bottom:1px solid var(--line);margin-bottom:30px}
.d-head h1{font-family:var(--f-display);font-weight:400;font-size:clamp(26px,3.6vw,36px);line-height:1.26;margin:14px 0 14px}
.d-parties{display:flex;flex-wrap:wrap;gap:8px 24px;color:var(--muted);font-size:14px}
.d-parties b{color:var(--ink);font-weight:500}
.d-parties a b{border-bottom:1px solid var(--line);transition:all .2s}
.d-parties a:hover b{border-color:var(--accent);color:var(--accent)}

.lens{display:inline-flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--card);margin-bottom:26px}
.lens button{padding:11px 24px;font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--line);transition:all .25s var(--ease)}
.lens button:last-child{border-right:none}
.lens button.on{background:var(--accent-deep);color:var(--ivory)}
.lens button:not(.on):hover{color:var(--ink);background:var(--paper)}

.facts{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;animation:fadeUp .4s var(--ease)}
@media(prefers-reduced-motion:reduce){.facts{animation:none}}
.fact{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px}
.fact .label{display:block;margin-bottom:8px}
.fact .val{font-size:14.5px;line-height:1.55}
.fact .val.big{font-family:var(--f-display);font-weight:600;font-size:21px;line-height:1.35}
.fact.wide{grid-column:1/-1}
.src{margin-top:30px;padding-top:20px;border-top:1px solid var(--line)}
.src a{color:var(--accent);font-size:13.5px;display:inline-block;margin:6px 20px 0 0;border-bottom:1px solid transparent;transition:border-color .2s}
.src a:hover{border-color:var(--accent)}

/* ---------- мини-диалог ---------- */
.miniai{margin-top:34px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius);padding:20px}
.miniai .label{display:block;margin-bottom:12px;color:var(--accent)}
.miniai-log{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.miniai-log:empty{display:none}
.msg{max-width:88%;padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.6;animation:fadeUp .3s var(--ease)}
.msg.user{align-self:flex-end;background:var(--accent-deep);color:var(--ivory)}
.msg.ai{align-self:flex-start;background:var(--paper);border:1px solid var(--line-soft)}
.msg.ai a{color:var(--accent);border-bottom:1px solid var(--accent-soft)}
.msg.wait{color:var(--muted);font-style:italic}
.ask{display:flex;gap:10px}
.ask input{flex:1;padding:12px 15px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);font:inherit;color:var(--ink);transition:border-color .2s}
.ask input:focus{outline:none;border-color:var(--accent);background:var(--card)}
.ask button{background:var(--accent-deep);color:var(--ivory);padding:0 22px;border-radius:var(--radius);font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:background .2s}
.ask button:hover{background:var(--accent)}

/* ---------- advisors ---------- */
.notice{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius);padding:17px 20px;margin-bottom:26px;color:var(--muted);font-size:13.5px;line-height:1.65}
.tbl{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);border-collapse:separate;border-spacing:0;overflow:hidden}
.tbl th{font-weight:600;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);text-align:left;padding:14px 20px;border-bottom:1px solid var(--line)}
.tbl td{padding:15px 20px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .2s}
.tbl tbody tr:hover{background:var(--paper)}
.tbl .r{text-align:right}
.firm-name{font-family:var(--f-display);font-weight:500;font-size:15.5px}
.firm-groups{color:var(--muted);font-size:12.5px;margin-top:4px;line-height:1.5}
.deal-chips a{display:inline-block;font-size:12px;color:var(--accent);border:1px solid var(--accent-soft);background:var(--accent-soft);border-radius:2px;padding:2px 8px;margin:2px 4px 2px 0;transition:all .2s}
.deal-chips a:hover{background:var(--accent);color:#fff}

/* ---------- companies ---------- */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.co-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;transition:border-color .25s,box-shadow .25s}
.co-card:hover{border-color:var(--accent);box-shadow:0 6px 24px -14px rgba(15,43,33,.28)}
.co-card h3{font-family:var(--f-display);font-weight:500;font-size:19px;margin:10px 0 6px;transition:color .2s}
.co-card:hover h3{color:var(--accent)}
.co-card .desc{color:var(--muted);font-size:13.5px;min-height:44px}
.co-nums{display:flex;gap:28px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line-soft)}
.co-nums .val{font-family:var(--f-display);font-weight:600;font-size:15px;margin-top:3px}

/* ---------- assistant ---------- */
.chat{max-width:740px;margin:0 auto}
.chat-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);min-height:300px;padding:24px;display:flex;flex-direction:column;gap:14px}
.suggests{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}

footer{border-top:1px solid var(--line);margin-top:70px;background:var(--card)}
.foot-in{max-width:1120px;margin:0 auto;padding:30px 28px;color:var(--muted);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

@media(max-width:720px){
  .deal-row{grid-template-columns:1fr;gap:10px}
  .deal-meta{text-align:left;display:flex;gap:14px;align-items:center}
  .top-in{gap:18px;overflow-x:auto;padding:0 20px}
  nav{gap:18px}
  nav a{white-space:nowrap}
  .wrap{padding:0 20px 80px}
  .hero{margin:0 -20px;padding:52px 20px 46px}
  .aisearch{flex-direction:column}
  .aisearch button{padding:14px}
}
</style>
</head>

function route(){
  const h = location.hash.replace("#","") || "/";
  const [_,page,arg] = h.split("/");
  document.querySelectorAll("#nav a").forEach(a=>a.classList.remove("on"));
  const mark = r => {const el=document.querySelector(`[data-r="${r}"]`); if(el) el.classList.add("on");};
  if(page===""||page===undefined){renderDeals();mark("deals");}
  else if(page==="deal"){renderDeal(arg);mark("deals");}
  else if(page==="companies"&&arg){renderCompany(arg);mark("companies");}
  else if(page==="companies"){renderCompanies();mark("companies");}
  else if(page==="advisors"){renderAdvisors();mark("advisors");}
  else if(page==="assistant"){renderAssistant();mark("assistant");}
  else {renderDeals();mark("deals");}
  window.scrollTo(0,0);
  requestAnimationFrame(()=>document.querySelectorAll(".reveal").forEach((el,i)=>setTimeout(()=>el.classList.add("in"),i*70)));
}

function localAnswer(q){
  const s = q.toLowerCase();
  const link = d => `<a href="#/deal/${d.id}">${d.title}</a>`;
  if(/крупн|больш|дорог/.test(s)){
    const d = DEALS.find(x=>x.id==="baltika");
    return `Самая крупная сделка в базе с известной оценкой — ${link(d)}: 34 млрд ₽ по данным Reuters из протокола правкомиссии. По Ситибанку официальная цена не раскрыта — Citi оценивала поступления лишь в ~$0,2 млрд. Суммы известны не по всем сделкам.`;
  }
  if(/иностран|уход|выход|exit|санкц/.test(s)){
    const ds = DEALS.filter(d=>/иностран|MBO|Выход/i.test(d.type));
    return `Сделок выхода иностранных владельцев в базе ${ds.length}: ${ds.map(link).join("; ")}. Общие черты: одобрение правкомиссии, дисконт к рыночной оценке, для банков — распоряжение Президента.`;
  }
  if(/литий|мали|росатом/.test(s)){
    const d = DEALS.find(x=>x.id==="rosatom-mali");
    return `По литию: ${link(d)}. Контроль 75% у «дочки» Росатома, разрешение на месторождение Бугула — у Moketi Mining SARL (Uranium One Group). Часть вертикали «сырьё → гигафабрики → электромобиль».`;

  if(/консультант|юрист|фирм|сопровожда|orion|орион|level/.test(s)){
    return `По данным базы (из публикаций самих фирм): Orion сопровождала 4 сделки — <a href="#/deal/citibank">Ситибанк</a> (за «Ренессанс Капитал»), <a href="#/deal/berizaryad">Бери заряд!</a> (за «Яндекс»), <a href="#/deal/hugoboss">Hugo Boss</a> (за «Стокманн») и <a href="#/deal/ksk">КСК</a> (за ГК «Дело»). LEVEL Legal Services — за акционеров «Заряда». По «Балтике» и Мали консультанты не раскрывались. Это только публичные данные, не рейтинг. Каталог фирм Право-300 — в разделе <a href="#/advisors">Консультанты</a>.`;

  if(/правкомисс|согласован|одобрен|указ/.test(s)){
    const ds = DEALS.filter(d=>/правкомисс|Президент/i.test(d.law.appr));
    return `Правкомиссия по иностранным инвестициям или указ/распоряжение Президента фигурируют в ${ds.length} сделках: ${ds.map(link).join("; ")}. Детали — в линзе «Юрист» на карточках.`;
  }
  if(/яндекс|заряд/.test(s)){
    const d = DEALS.find(x=>x.id==="berizaryad");
    return `${link(d)}: 100% АО «Заряд!», оценка в предложении инвесторам — 4,2 млрд ₽. Юристы: Orion за «Яндекс», LEVEL Legal Services за продавцов; финконсультант — Aspring Capital.`;
  }
  const hit = DEALS.find(d=>(d.title+" "+d.ind+" "+d.type).toLowerCase().split(/[^а-яa-zё0-9]+/).some(w=>w.length>3&&s.includes(w)));
  if(hit) return `Похоже, вы про ${link(hit)} (${hit.ind}, ${fmtDate(hit.date)}). Откройте карточку — линзы «Экономист» и «Юрист» со ссылками на первоисточники.`;
  return `В демо-базе шесть сделок — точного совпадения нет. Попробуйте: «самая крупная сделка», «кто сопровождал сделки», «выходы иностранцев». С ключом ANTHROPIC_API_KEY в переменных Railway ассистент отвечает через ИИ на любые вопросы по базе.`;
}

async function aiAnswer(q){
  try{
    const r = await fetch("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q,context:AI_CONTEXT})});
    const data = await r.json();
    if(data.answer) return data.answer
      .replace(/\[([^\]]+)\]\((#\/[^\)]+)\)/g,'<a href="$2">$1</a>')
      .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
  }catch(e){}
  return localAnswer(q);
}

/* ================= МИНИ-ДИАЛОГ ================= */
function mountMiniAI(contextName){
  const root=document.getElementById("miniai");
  const log=root.querySelector(".miniai-log");
  const input=root.querySelector("input");
  const btn=root.querySelector("button");
  const push=(cls,html)=>{const m=document.createElement("div");m.className="msg "+cls;m.innerHTML=html;log.appendChild(m);return m;};
  const send=async()=>{
    const v=input.value.trim();if(!v)return;
    push("user",v);input.value="";
    const w=push("ai wait","Ищу по базе…");
    const a=await aiAnswer(`Контекст: пользователь смотрит «${contextName}». Вопрос: ${v}`);
    w.classList.remove("wait");w.innerHTML=a;
  };
  btn.onclick=send;
  input.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
}

const SUGGESTS = ["Кто сопровождал сделки в базе?","Какая самая крупная сделка?","Кто выходил из российского рынка?","Где были согласования правкомиссии?"];
