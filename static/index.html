<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реестр — сделки и компании российского рынка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&family=IBM+Plex+Sans:wght@400;500;600&subset=cyrillic&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F5F2; --card:#FFFFFF; --ink:#1B2228; --muted:#5B6570;
  --line:#DFE3DE; --line-soft:#EAEDE8;
  --accent:#1F5C46; --accent-ink:#174437; --accent-soft:#EAF1ED;
  --radius:6px;
  --f-display:'Literata',Georgia,serif;
  --f-body:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--f-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
.num{font-variant-numeric:tabular-nums}
.label{font-family:var(--f-body);font-weight:600;font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted)}

/* ---------- shell ---------- */
.top{position:sticky;top:0;z-index:50;background:rgba(244,245,242,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.top-in{max-width:1080px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;gap:32px}
.wordmark{font-family:var(--f-display);font-weight:600;font-size:21px}
.wordmark span{color:var(--accent)}
nav{display:flex;gap:4px;margin-left:auto}
nav a{padding:7px 13px;border-radius:var(--radius);font-size:14px;color:var(--muted)}
nav a:hover{color:var(--ink)}
nav a.on{color:var(--ink);background:var(--card);box-shadow:inset 0 0 0 1px var(--line)}
.wrap{max-width:1080px;margin:0 auto;padding:36px 24px 90px}

/* ---------- hero + ИИ-поиск ---------- */
.hero{padding:22px 0 30px;border-bottom:1px solid var(--line);margin-bottom:26px}
.hero h1{font-family:var(--f-display);font-weight:500;font-size:clamp(26px,4vw,36px);line-height:1.22;max-width:680px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);margin-top:10px;max-width:560px}
.aisearch{display:flex;gap:10px;margin-top:22px;max-width:640px}
.aisearch input{flex:1;padding:13px 18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);font:inherit;color:var(--ink)}
.aisearch input::placeholder{color:var(--muted)}
.aisearch input:focus{outline:none;border-color:var(--accent)}
.aisearch button{background:var(--accent);color:#fff;padding:0 22px;border-radius:var(--radius);font-weight:500;transition:background .15s;white-space:nowrap}
.aisearch button:hover{background:var(--accent-ink)}

/* ---------- filters ---------- */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.chip{padding:6px 14px;border:1px solid var(--line);border-radius:99px;background:var(--card);font-size:13px;color:var(--muted);transition:all .15s}
.chip:hover{border-color:var(--muted)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ---------- deal rows ---------- */
.deal-row{display:grid;grid-template-columns:92px 1fr 180px;gap:20px;padding:20px 18px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;transition:border-color .15s,transform .15s;align-items:start}
.deal-row:hover{border-color:var(--accent);transform:translateY(-1px)}
.deal-title{font-family:var(--f-display);font-weight:500;font-size:19px;line-height:1.32}
.deal-sub{color:var(--muted);font-size:13.5px;margin-top:5px}
.deal-meta{text-align:right}
.deal-sum{font-family:var(--f-display);font-weight:600;font-size:17px}
.deal-sum.na{color:var(--muted);font-weight:400;font-size:14px;font-family:var(--f-body)}
.tag{display:inline-block;margin-top:7px;font-weight:600;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:3px}
.status{display:inline-block;font-weight:600;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--line);border-radius:3px;color:var(--muted)}
.status.closed{border-color:var(--accent);color:var(--accent)}

/* ---------- detail ---------- */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13.5px;margin-bottom:22px}
.back:hover{color:var(--ink)}
.d-head{padding-bottom:24px;border-bottom:1px solid var(--line);margin-bottom:26px}
.d-head h1{font-family:var(--f-display);font-weight:500;font-size:clamp(24px,3.4vw,32px);line-height:1.28;margin:10px 0 12px}
.d-parties{display:flex;flex-wrap:wrap;gap:8px 22px;color:var(--muted);font-size:14px}
.d-parties b{color:var(--ink);font-weight:500}
.d-parties a b{border-bottom:1px solid var(--line)}
.d-parties a:hover b{border-color:var(--accent);color:var(--accent)}

/* lens switcher */
.lens{display:inline-flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--card);margin-bottom:24px}
.lens button{padding:9px 20px;font-weight:600;font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--line);transition:all .15s}
.lens button:last-child{border-right:none}
.lens button.on{background:var(--accent);color:#fff}
.lens button:not(.on):hover{color:var(--ink);background:var(--paper)}

.facts{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.facts{animation:none}.deal-row:hover{transform:none}}
.fact{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
.fact .label{display:block;margin-bottom:7px}
.fact .val{font-size:14.5px;line-height:1.5}
.fact .val.big{font-family:var(--f-display);font-weight:600;font-size:20px}
.fact.wide{grid-column:1/-1}
.src{margin-top:26px;padding-top:18px;border-top:1px solid var(--line)}
.src a{color:var(--accent);font-size:13.5px;display:inline-block;margin:4px 18px 0 0;border-bottom:1px solid var(--accent-soft)}
.src a:hover{border-color:var(--accent)}

/* ---------- мини-диалог ИИ в карточках ---------- */
.miniai{margin-top:30px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.miniai .label{display:block;margin-bottom:10px}
.miniai-log{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.miniai-log:empty{display:none}
.msg{max-width:88%;padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.55}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff}
.msg.ai{align-self:flex-start;background:var(--paper);border:1px solid var(--line-soft)}
.msg.ai a{color:var(--accent);border-bottom:1px solid var(--accent-soft)}
.ask{display:flex;gap:10px}
.ask input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);font:inherit;color:var(--ink)}
.ask input:focus{outline:none;border-color:var(--accent);background:var(--card)}
.ask button{background:var(--ink);color:#fff;padding:0 20px;border-radius:var(--radius);font-weight:500;transition:background .15s}
.ask button:hover{background:var(--accent-ink)}

/* ---------- advisors ---------- */
.notice{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius);padding:15px 18px;margin-bottom:24px;color:var(--muted);font-size:13.5px;line-height:1.6}
.tbl{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);border-collapse:separate;border-spacing:0;overflow:hidden}
.tbl th{font-weight:600;font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);text-align:left;padding:13px 18px;border-bottom:1px solid var(--line)}
.tbl td{padding:14px 18px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl .r{text-align:right}
.firm-name{font-weight:500}
.firm-focus{color:var(--muted);font-size:13px;margin-top:3px}

/* ---------- companies ---------- */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.co-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;transition:border-color .15s}
.co-card:hover{border-color:var(--accent)}
.co-card h3{font-family:var(--f-display);font-weight:500;font-size:18px;margin:8px 0 4px}
.co-card .desc{color:var(--muted);font-size:13.5px;min-height:42px}
.co-nums{display:flex;gap:26px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft)}
.co-nums .val{font-family:var(--f-display);font-weight:600;font-size:15px;margin-top:2px}

/* ---------- assistant page ---------- */
.chat{max-width:720px;margin:0 auto}
.chat-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);min-height:300px;padding:22px;display:flex;flex-direction:column;gap:14px}
.suggests{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}

.sec-head{margin-bottom:22px}
.sec-head h1{font-family:var(--f-display);font-weight:500;font-size:28px}
.sec-head p{color:var(--muted);margin-top:6px;max-width:640px}

footer{border-top:1px solid var(--line);margin-top:60px}
.foot-in{max-width:1080px;margin:0 auto;padding:26px 24px;color:var(--muted);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

@media(max-width:720px){
  .deal-row{grid-template-columns:1fr;gap:10px}
  .deal-meta{text-align:left;display:flex;gap:12px;align-items:center}
  .top-in{gap:14px;overflow-x:auto}
  nav a{white-space:nowrap;padding:7px 9px}
  .aisearch{flex-direction:column}
  .aisearch button{padding:12px}
}
</style>

function route(){
  const h = location.hash.replace("#","") || "/";
  const [_,page,arg] = h.split("/");
  document.querySelectorAll("#nav a").forEach(a=>a.classList.remove("on"));
  const mark = r => {const el=document.querySelector(`[data-r="${r}"]`); if(el) el.classList.add("on");};
  if(page===""||page===undefined){renderDeals();mark("deals");}
  else if(page==="deal"){renderDeal(arg);mark("deals");}
  else if(page==="companies"&&arg){renderCompany(arg);mark("companies");}
  else if(page==="companies"){renderCompanies();mark("companies");}
  else if(page==="advisors"){renderAdvisors();mark("advisors");}
  else if(page==="assistant"){renderAssistant();mark("assistant");}
  else {renderDeals();mark("deals");}
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

/* ================= ИИ-ДВИЖОК (демо: поиск по локальной базе) ================= */
function aiAnswer(q){
  const s = q.toLowerCase();
  const link = d => `<a href="#/deal/${d.id}">${d.title}</a>`;
  if(/крупн|больш|дорог/.test(s)){
    const d = DEALS.find(x=>x.id==="baltika");
    return `Самая крупная сделка в базе с известной оценкой — ${link(d)}: 34 млрд ₽ по данным Reuters из протокола правкомиссии. По Ситибанку официальная цена не раскрыта — Citi оценивала поступления лишь в ~$0,2 млрд при убытке от выхода ~$1,1 млрд. Учтите: суммы известны не по всем сделкам.`;
  }
  if(/иностран|уход|выход|exit|санкц/.test(s)){
    const ds = DEALS.filter(d=>/иностран|MBO|Выход/i.test(d.type));
    return `Сделок выхода иностранных владельцев в базе ${ds.length}: ${ds.map(link).join("; ")}. Общие черты: одобрение правкомиссии по иностранным инвестициям, дисконт к рыночной оценке, для банков — отдельное распоряжение Президента.`;
  }
  if(/литий|мали|росатом|добыч/.test(s)){
    const d = DEALS.find(x=>x.id==="rosatom-mali");
    return `По литию в базе: ${link(d)}. Контроль 75% у «дочки» Росатома, разрешение на месторождение Бугула передано Moketi Mining SARL (Uranium One Group). Это часть вертикали «сырьё → гигафабрики → электромобиль».`;
  }
  if(/яндекс|заряд|it|ит|техно/.test(s)){
    const d = DEALS.find(x=>x.id==="berizaryad");
    return `Из ИТ-сделок: ${link(d)}. 100% АО «Заряд!», оценка в материалах для инвесторов — 4,2 млрд ₽, финансовый консультант — Aspring Capital. Цель — интеграция в Яндекс Go и рост сети до 100 тыс. станций.`;
  }
  if(/консультант|юрист|фирм|сопровожда/.test(s)){
    return `Честный ответ: по сделкам в текущей базе юридические консультанты в публичных источниках не раскрывались — это типично для российского рынка после 2022 года. Известен финансовый консультант по «Бери заряд!» — Aspring Capital. Каталог юрфирм федерального рынка — в разделе <a href="#/advisors">Консультанты</a>.`;
  }
  if(/правкомисс|согласован|одобрен|указ/.test(s)){
    const ds = DEALS.filter(d=>/правкомисс|Президент/i.test(d.law.appr));
    return `Согласование правкомиссии по иностранным инвестициям или указ/распоряжение Президента упоминаются в ${ds.length} сделках: ${ds.map(link).join("; ")}. Откройте линзу «Юрист» на карточке — там детали по каждому согласованию.`;
  }
  const hit = DEALS.find(d=>(d.title+" "+d.ind+" "+d.type).toLowerCase().split(/[^а-яa-zё0-9]+/).some(w=>w.length>3&&s.includes(w)));
  if(hit) return `Похоже, вы про ${link(hit)} (${hit.ind}, ${fmtDate(hit.date)}). Откройте карточку — там линзы «Экономист» и «Юрист» со всеми известными деталями и ссылками на первоисточники.`;
  return `В демо-базе шесть сделок — по этому запросу точного совпадения нет. Попробуйте: «самая крупная сделка», «выходы иностранцев», «литий», «согласования правкомиссии». В полной версии здесь ИИ-поиск по всей базе.`;
}

function mountMiniAI(containerId, contextName){
  const root=document.getElementById(containerId);
  const log=root.querySelector(".miniai-log");
  const input=root.querySelector("input");
  const btn=root.querySelector("button");
  const push=(cls,html)=>{const m=document.createElement("div");m.className="msg "+cls;m.innerHTML=html;log.appendChild(m);};
  const send=()=>{const v=input.value.trim();if(!v)return;push("user",v);input.value="";setTimeout(()=>push("ai",aiAnswer(contextName+" "+v)),300);};
  btn.onclick=send;
  input.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
}
const miniAIHtml = ph => `

    <div class="miniai-log"></div>
    <div class="ask"><input placeholder="${ph}"><button>Спросить</button></div>
  </div>`;

      <div class="fact wide"><span class="label">Контекст</span><div class="val">${d.eco.context}</div></div>
    </div>`;
    else if(lens==="law") f.innerHTML = `<div class="facts">
      <div class="fact wide"><span class="label">Структура</span><div class="val">${d.law.struct}</div></div>
      <div class="fact wide"><span class="label">Согласования</span><div class="val">${d.law.appr}</div></div>
      <div class="fact wide"><span class="label">Консультанты</span><div class="val">${d.law.adv}</div></div>
      <div class="fact wide"><span class="label">Условия и особенности (из публичных данных)</span><div class="val">${d.law.terms}</div></div>
    </div>`;
    else f.innerHTML = `<div class="facts">
      <div class="fact"><span class="label">Сумма</span><div class="val big num">${d.sum}</div></div>
      <div class="fact"><span class="label">Предмет</span><div class="val">${d.eco.share}</div></div>
      <div class="fact"><span class="label">Статус</span><div class="val">${d.status}</div></div>
      <div class="fact wide"><span class="label">Суть</span><div class="val">${d.eco.rationale}</div></div>
      <div class="fact wide"><span class="label">Контекст</span><div class="val">${d.eco.context}</div></div>
    </div>`;
  };
  paint();
  app.querySelectorAll("[data-l]").forEach(b=>b.onclick=()=>{
    lens=b.dataset.l;
    app.querySelectorAll("[data-l]").forEach(x=>x.classList.toggle("on",x===b));
    paint();
  });
  mountMiniAI("miniai", d.title);
}

/* ================= АССИСТЕНТ ================= */
const SUGGESTS = ["Какая самая крупная сделка?","Кто выходил из российского рынка?","Что известно про литий в Мали?","Где были согласования правкомиссии?"];
function renderAssistant(){
  app.innerHTML = `
  <div class="chat">
    <div class="sec-head"><h1>Ассистент</h1><p>Отвечает только по базе платформы со ссылками на карточки и источники. В демо — локальный поиск; в продакшене — ИИ поверх полной базы.</p></div>
    <div class="chat-box" id="chatbox">
      <div class="msg ai">Задайте вопрос о сделках, компаниях или консультантах — отвечу по данным базы.</div>
    </div>
    <div class="suggests">${SUGGESTS.map((q,i)=>`<button class="chip" data-q="${i}">${q}</button>`).join("")}</div>
    <div class="ask">
      <input id="q" placeholder="Например: кто выходил из России?" aria-label="Вопрос ассистенту">
      <button id="send">Спросить</button>
    </div>
  </div>`;
  const box=document.getElementById("chatbox");
  const push=(cls,html)=>{const m=document.createElement("div");m.className="msg "+cls;m.innerHTML=html;box.appendChild(m);box.scrollTop=box.scrollHeight;};
  const answer=q=>{push("user",q);setTimeout(()=>push("ai",aiAnswer(q)),350);};
  document.getElementById("send").onclick=()=>{const v=document.getElementById("q").value.trim();if(v){answer(v);document.getElementById("q").value="";}};
  document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("send").click();});
  app.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>answer(SUGGESTS[b.dataset.q]));
  const pending=sessionStorage.getItem("pendingQ");
  if(pending){sessionStorage.removeItem("pendingQ");answer(pending);}
}

route();
</script>
